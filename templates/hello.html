<div class="topDiv">
  <title>Travel Assistant</title>
  {% if person %}
  <h1>Hello {{ person }}!</h1>
  {% else %}
  <h1>Welcome Traveler</h1>
  {% endif %}
  <form onSubmit="sendData(); return false ">
    <div class="inputDiv">
      <label class="Supertext" for="addy1">Location:</label>
      <input class="textboxcool" type="text" id="addy1" name="addy1"><br><br>
    </div>
    <div class="inputDiv">
      <label class="Supertext" for="addy2">Destination:</label>
      <input class="textboxcool" type="text" id="addy2" name="addy2"><br><br>
    </div>
    <input class="thatButton" type="submit" value="Submit">
  </form>
  <br><br>
  <geolocation class="uselocationbutton">
    <button id="fallback">Use location</button>
  </geolocation>
  <p id="output"></p>
</div>

<div class="weatherDiv">
  <div class = "internalDiv">
    <div class = "subDiv">
      <h2>Starting Weather</h3>
  <div class="internalDiv">
    <div class="subDiv">
      <h3>Starting Weather</h3>
    </div>
      <h3 id="startw">Starting Weather</h3>
  </div>
  <div class = "internalDiv">
    <div class = "subDiv">
  </div>
  <div class = "internalDiv">
    <div class = "subDiv">
      <h3>Destination Weather</h3>
    </div>
    <h2 id= "endw">Destination Weather</h2>
    <img class = "weather" src="/static/weather.png" alt="Beautiful Weather Art" style="max-width: 200px; height: 200px;">
  <div class="internalDiv">
    <div class="subDiv">
      <h3>Destination Weather</h3>
    </div>
    <h2>Weather at end</h2>
  </div>

</div>

<div class="chuntdiv">
  <h2>Travel Itinerary</h2>
  <table>
    <tr>
      <th class="topth" style="color:white" colspan=2>
        <label for="start">Select date:</label>
        <input type="date" id="start" name="trip-start">
      </th>
    <tr>
      <th style="width:75px">Time</th>
      <th style="width:325px">Activity</th>
    </tr>
    <tr>
      <td><input type="time"></td>
      <td><input class="itinerarytext" type="text" placeholder="Enter itinerary"></td>
    </tr>
    <tr>
      <td><input type="time"></td>
      <td><input class="itinerarytext" type="text" placeholder="Walk Around Central Park"></td>
    </tr>
    <tr>
      <td><input type="time"></td>
      <td><input class="itinerarytext" type="text" placeholder="Lunch"></td>
    </tr>
    <tr>
      <td><input type="time"></td>
      <td><input class="itinerarytext" type="text" placeholder="American Museum of Natural History Tour"></td>
    </tr>
    <tr>
      <td><input type="time"></td>
      <td><input class="itinerarytext" type="text" placeholder="Dinner"></td>
    </tr>
    <tr>
      <td><input type="time"></td>
      <td><input class="itinerarytext" type="text" placeholder="Explore Times Square"></td>
    </tr>
  </table>

 
</div>
<button onclick="Gocrazy()">Print Page</button>
